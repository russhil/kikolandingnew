<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Kiko AI Order Taker — Choose your language</title>
<meta name="description" content="Kiko turns your order calls into ready-made orders automatically. Choose your language to continue.">
<meta property="og:title" content="Kiko AI Order Taker">
<meta property="og:image" content="en/logo_kiko.png">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,system-ui,sans-serif;
    min-height:100svh;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(900px 480px at 50% -120px,#efe7ff 0%,rgba(239,231,255,0) 70%),linear-gradient(180deg,#fbfaff,#fff);
    color:#1b1240;padding:28px;-webkit-font-smoothing:antialiased;
  }
  .card{width:100%;max-width:380px;text-align:center}
  img{width:84px;height:84px;border-radius:20px;object-fit:contain;margin-bottom:16px}
  h1{font-size:23px;letter-spacing:-.02em;font-weight:840;line-height:1.2}
  p{color:#5b5470;font-size:14.5px;margin:8px 0 24px}
  .opts{display:flex;flex-direction:column;gap:11px}
  a.lang{
    display:flex;align-items:center;justify-content:space-between;
    background:#fff;border:1px solid #eae6f6;border-radius:15px;
    padding:15px 18px;font-weight:800;font-size:16.5px;color:#1b1240;
    text-decoration:none;box-shadow:0 4px 14px rgba(43,15,110,.07);
    transition:transform .12s ease,box-shadow .12s ease,border-color .12s ease;
  }
  a.lang:hover{transform:translateY(-1px);border-color:#cdbff0;box-shadow:0 8px 22px rgba(43,15,110,.12)}
  a.lang .en{font-size:12.5px;font-weight:700;color:#4324a6;background:#f0eafc;padding:4px 10px;border-radius:999px}
  .ft{margin-top:22px;font-size:12px;color:#8a83a3}
</style>
</head>
<body>
  <div class="card">
    <img src="en/logo_kiko.png" alt="Kiko">
    <h1>Kiko AI Order Taker</h1>
    <p>Choose your language · તમારી ભાષા પસંદ કરો · अपनी भाषा चुनें</p>
    <div class="opts">
      <a class="lang" href="en/">English <span class="en">EN</span></a>
      <a class="lang" href="hi/">हिन्दी <span class="en">HI</span></a>
      <a class="lang" href="gu/">ગુજરાતી <span class="en">GU</span></a>
      <a class="lang" href="mr/">मराठी <span class="en">MR</span></a>
    </div>
    <div class="ft">Free on Google Play · Made for Indian sellers</div>
  </div>
</body>
</html>
